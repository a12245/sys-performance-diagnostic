port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info
external-controller: 127.0.0.1:9090
proxies:
  - name: ⚡WARP-www.visa.com
    type: vless
    server: www.visa.com
    port: 443
    uuid: e3b0c442-98fc-11e5-b745-feff819cdc9f
    udp: true
    tls: true
    network: ws
    servername: milwaukee-leaf-amanda-imperial.trycloudflare.com
    skip-cert-verify: true
    client-fingerprint: chrome
    ws-opts:
      path: "/"
      headers:
        Host: milwaukee-leaf-amanda-imperial.trycloudflare.com

  - name: ⚡WARP-www.visa.com.sg
    type: vless
