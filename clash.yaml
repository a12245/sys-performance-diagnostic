proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies:
      - ♻️ 自动选择
      - ⚡WARP-www.visa.com
      - ⚡WARP-www.visa.com.sg
      - ⚡WARP-www.wto.org
      - ⚡WARP-icook.tw
      - ⚡WARP-ip.sb
  - name: ♻️ 自动选择
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    proxies:
      - ⚡WARP-www.visa.com
      - ⚡WARP-www.visa.com.sg
      - ⚡WARP-www.wto.org
      - ⚡WARP-icook.tw
      - ⚡WARP-ip.sb
rules:
  - GEOIP,CN,DIRECT
  - MATCH,🚀 节点选择
